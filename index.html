<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="theme-color" id="meta-theme" content="#F4F0E8">
<title>islet</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg:        #F4F0E8;
    --card:      #FCFAF5;
    --user:      #FFFFFF;
    --ink:       #3A332B;
    --ink-2:     #837868;
    --ink-3:     #ABA08E;
    --accent:    #C0683F;
    --accent-weak: rgba(192,104,63,0.10);
    --accent-line: rgba(192,104,63,0.30);
    --line:      rgba(58,51,43,0.09);
    --code-bg:   #EEE7DA;
    --code-head: rgba(58,51,43,0.04);
    --scrim:     rgba(36,31,25,0.32);
    --radius:    20px;
    --radius-sm: 12px;
    --safe-top:    env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --serif:     "Songti SC", "Source Han Serif SC", "Noto Serif CJK SC", STSong, Georgia, "Times New Roman", serif;
    color-scheme: light;
  }

  /* 夜晚的同一个房间：暖深棕，不是冷灰；赭石提亮一档保证对比度 */
  :root[data-theme="dark"] {
    --bg:        #221E1A;
    --card:      #2C2722;
    --user:      #342E27;
    --ink:       #EAE3D7;
    --ink-2:     #A99D8B;
    --ink-3:     #7D7263;
    --accent:    #DB8B5B;
    --accent-weak: rgba(219,139,91,0.13);
    --accent-line: rgba(219,139,91,0.38);
    --line:      rgba(234,227,215,0.10);
    --code-bg:   #2B2620;
    --code-head: rgba(234,227,215,0.05);
    --scrim:     rgba(0,0,0,0.5);
    color-scheme: dark;
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg:        #221E1A;
      --card:      #2C2722;
      --user:      #342E27;
      --ink:       #EAE3D7;
      --ink-2:     #A99D8B;
      --ink-3:     #7D7263;
      --accent:    #DB8B5B;
      --accent-weak: rgba(219,139,91,0.13);
      --accent-line: rgba(219,139,91,0.38);
      --line:      rgba(234,227,215,0.10);
      --code-bg:   #2B2620;
      --code-head: rgba(234,227,215,0.05);
      --scrim:     rgba(0,0,0,0.5);
      color-scheme: dark;
    }
  }

  /* 冰蓝色调：清冷的灰蓝纸面 / 深蓝炭的夜 */
  :root[data-palette="cool"] {
    --bg:        #EFF2F5;
    --card:      #F9FBFC;
    --user:      #FFFFFF;
    --ink:       #2B3138;
    --ink-2:     #5E6B77;
    --ink-3:     #97A3AF;
    --accent:    #2F6E99;
    --accent-weak: rgba(47,110,153,0.10);
    --accent-line: rgba(47,110,153,0.32);
    --line:      rgba(43,49,56,0.09);
    --code-bg:   #E3E9EE;
    --code-head: rgba(43,49,56,0.04);
    --scrim:     rgba(30,36,42,0.32);
    color-scheme: light;
  }
  :root[data-palette="cool"][data-theme="dark"] {
    --bg:        #171B20;
    --card:      #1F252B;
    --user:      #262D34;
    --ink:       #DEE5EB;
    --ink-2:     #8D99A5;
    --ink-3:     #66717C;
    --accent:    #7FB5D6;
    --accent-weak: rgba(127,181,214,0.13);
    --accent-line: rgba(127,181,214,0.38);
    --line:      rgba(222,229,235,0.10);
    --code-bg:   #20262C;
    --code-head: rgba(222,229,235,0.05);
    --scrim:     rgba(0,0,0,0.5);
    color-scheme: dark;
  }
  @media (prefers-color-scheme: dark) {
    :root[data-palette="cool"]:not([data-theme="light"]) {
      --bg:        #171B20;
      --card:      #1F252B;
      --user:      #262D34;
      --ink:       #DEE5EB;
      --ink-2:     #8D99A5;
      --ink-3:     #66717C;
      --accent:    #7FB5D6;
      --accent-weak: rgba(127,181,214,0.13);
      --accent-line: rgba(127,181,214,0.38);
      --line:      rgba(222,229,235,0.10);
      --code-bg:   #20262C;
      --code-head: rgba(222,229,235,0.05);
      --scrim:     rgba(0,0,0,0.5);
      color-scheme: dark;
    }
  }

  body {
    font-family: -apple-system, "PingFang SC", "Helvetica Neue", "Microsoft YaHei", sans-serif;
    background: var(--bg); color: var(--ink);
    height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  .serif { font-family: var(--serif); }

  /* 顶栏 */
  .header { display: flex; align-items: center; gap: 8px; padding: calc(10px + var(--safe-top)) 12px 10px; flex-shrink: 0; background: var(--bg); }
  .icon-btn { background: none; border: none; cursor: pointer; color: var(--ink-2); width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background .15s, color .15s; }
  .icon-btn:active { background: var(--accent-weak); color: var(--accent); }
  .icon-btn svg { width: 20px; height: 20px; }
  .model-pill { flex: 1; min-width: 0; margin: 0 auto; max-width: 320px; background: var(--card); border: 1px solid var(--line); border-radius: 999px; padding: 8px 14px; display: flex; align-items: center; justify-content: center; gap: 7px; cursor: pointer; color: var(--ink); font-size: 14px; box-shadow: 0 1px 3px rgba(58,51,43,0.04); transition: border-color .15s; }
  .model-pill:active { border-color: var(--accent-line); }
  .pill-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
  .pill-name { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pill-sub { color: var(--ink-3); font-size: 12px; flex-shrink: 0; }
  .pill-chev { color: var(--ink-3); flex-shrink: 0; display: flex; }

  /* 对话区 */
  .chat { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 8px 16px 20px; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; }
  .chat::-webkit-scrollbar { width: 0; }
  .msg { display: flex; flex-direction: column; max-width: 86%; }
  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.ai { align-self: flex-start; align-items: flex-start; width: 100%; max-width: 100%; }
  .bubble { background: var(--user); border: 1px solid var(--line); border-radius: var(--radius); border-bottom-right-radius: 7px; padding: 11px 15px; font-size: 15.5px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; box-shadow: 0 1px 4px rgba(58,51,43,0.05); }
  .time { font-size: 11px; color: var(--ink-3); padding: 4px 4px 0; }

  .ai-eyebrow { display: flex; align-items: center; gap: 7px; font-size: 13.5px; color: var(--ink-2); margin-bottom: 7px; }
  .ai-eyebrow .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); }
  .ai-eyebrow .name { font-weight: 600; color: var(--ink); }
  .ai-eyebrow .t { color: var(--ink-3); font-size: 11.5px; }

  /* 思考块 */
  .think { margin-bottom: 10px; width: 100%; }
  .think-head { display: flex; align-items: center; gap: 7px; background: none; border: none; cursor: pointer; color: var(--ink-2); font-size: 13px; padding: 2px 0; width: 100%; }
  .think-head .spark { color: var(--accent); display: flex; flex-shrink: 0; }
  .think-head .lbl { flex: 1; text-align: left; }
  .think-head .chev { color: var(--ink-3); display: flex; flex-shrink: 0; transition: transform .2s; }
  .think.open .think-head .chev { transform: rotate(90deg); }
  .think-body { max-height: 0; overflow: hidden; transition: max-height .25s ease; }
  .think.open .think-body { max-height: 280px; overflow-y: auto; }
  .think-body::-webkit-scrollbar { width: 0; }
  .think-body-inner { font-family: var(--serif) !important; margin-top: 8px; padding: 2px 0 2px 12px; border-left: 2px solid var(--accent-line); font-size: 13.5px; line-height: 1.7; color: var(--ink-2); font-style: italic; white-space: pre-wrap; word-break: break-word; }

  /* AI 正文 + Markdown */
  .ai-text { font-family: var(--serif) !important; font-size: 16px; line-height: 1.75; color: var(--ink); word-break: break-word; }
  .ai-text.err { color: var(--accent); white-space: pre-wrap; }
  .ai-text p { margin: 0 0 10px; }
  .ai-text p:last-child { margin-bottom: 0; }
  .ai-text h1, .ai-text h2, .ai-text h3, .ai-text h4 { line-height: 1.35; margin: 14px 0 8px; font-weight: 700; }
  .ai-text h1 { font-size: 20px; } .ai-text h2 { font-size: 18px; } .ai-text h3 { font-size: 16.5px; } .ai-text h4 { font-size: 15.5px; }
  .ai-text ul, .ai-text ol { margin: 6px 0 10px; padding-left: 22px; }
  .ai-text li { margin: 3px 0; }
  .ai-text blockquote { margin: 8px 0; padding: 2px 0 2px 12px; border-left: 3px solid var(--accent-line); color: var(--ink-2); }
  .ai-text hr { border: none; border-top: 1px solid var(--line); margin: 14px 0; }
  .ai-text a { color: var(--accent); text-decoration: underline; text-underline-offset: 2px; word-break: break-all; }
  .ai-text code { background: var(--code-bg); border-radius: 5px; padding: 1px 5px; font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 0.9em; }
  .ai-text strong { font-weight: 700; }
  .code-wrap { margin: 10px 0; border: 1px solid var(--line); border-radius: var(--radius-sm); overflow: hidden; background: var(--code-bg); }
  .code-head { display: flex; align-items: center; justify-content: space-between; padding: 6px 12px; background: var(--code-head); border-bottom: 1px solid var(--line); }
  .code-lang { font-size: 11px; color: var(--ink-3); letter-spacing: .04em; text-transform: lowercase; }
  .code-copy { background: none; border: none; color: var(--ink-2); font-size: 12px; cursor: pointer; padding: 2px 4px; border-radius: 5px; }
  .code-copy:active { color: var(--accent); }
  .code-wrap pre { margin: 0; padding: 12px; overflow-x: auto; }
  .code-wrap pre::-webkit-scrollbar { height: 6px; }
  .code-wrap pre::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }
  .code-wrap code { background: none; padding: 0; font-size: 12.5px; line-height: 1.55; color: var(--ink); white-space: pre; }

  .cursor::after { content: ''; display: inline-block; width: 7px; height: 1.05em; background: var(--accent); margin-left: 2px; vertical-align: text-bottom; border-radius: 1px; animation: blink 1s steps(2) infinite; }
  @keyframes blink { 0%,50% { opacity: 1; } 50.01%,100% { opacity: 0; } }

  /* 断流提示 */
  .broke { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-top: 10px; padding: 8px 12px; background: var(--accent-weak); border-radius: var(--radius-sm); font-size: 12.5px; color: var(--ink-2); }
  .broke b { color: var(--accent); font-weight: 600; }
  .broke button { background: var(--card); border: 1px solid var(--accent-line); color: var(--accent); font-size: 12.5px; padding: 5px 12px; border-radius: 999px; cursor: pointer; }
  .broke button:active { background: var(--accent); color: #fff; }

  /* 空状态 */
  .empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: var(--ink-3); text-align: center; padding: 40px; }
  .empty .glyph { font-size: 30px; color: var(--accent); opacity: .55; }
  .empty .line1 { font-size: 15px; color: var(--ink-2); }
  .empty .line2 { font-size: 12.5px; color: var(--ink-3); }

  /* 输入栏 */
  .input-bar { display: flex; align-items: flex-end; gap: 9px; padding: 8px 14px calc(12px + var(--safe-bottom)); background: var(--bg); flex-shrink: 0; border-top: 1px solid var(--line); }
  .input-wrap { flex: 1; background: var(--card); border: 1px solid var(--line); border-radius: 22px; padding: 9px 16px; display: flex; align-items: flex-end; transition: border-color .15s; }
  .input-wrap:focus-within { border-color: var(--accent-line); }
  #msg-input { flex: 1; background: none; border: none; outline: none; color: var(--ink); font-size: 15.5px; font-family: inherit; resize: none; line-height: 1.5; max-height: 130px; min-height: 22px; }
  #msg-input::placeholder { color: var(--ink-3); }
  .send-btn { width: 40px; height: 40px; background: var(--accent); border: none; border-radius: 50%; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: opacity .15s, transform .1s; }
  .send-btn:active { transform: scale(.92); }
  .send-btn:disabled { opacity: .35; }
  .send-btn svg { width: 19px; height: 19px; }

  /* 覆盖层 / 底部抽屉 */
  .overlay { position: fixed; inset: 0; z-index: 50; background: var(--scrim); backdrop-filter: blur(2px); display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: opacity .2s; }
  .overlay.show { opacity: 1; pointer-events: auto; }
  .sheet { width: 100%; background: var(--bg); border-radius: 22px 22px 0 0; padding: 8px 0 calc(16px + var(--safe-bottom)); max-height: 88dvh; display: flex; flex-direction: column; transform: translateY(100%); transition: transform .26s cubic-bezier(.22,.61,.36,1); box-shadow: 0 -8px 40px rgba(36,31,25,0.16); }
  .overlay.show .sheet { transform: translateY(0); }
  .grabber { width: 38px; height: 4px; border-radius: 2px; background: var(--line); margin: 8px auto 6px; flex-shrink: 0; }
  .sheet-head { display: flex; align-items: center; justify-content: space-between; padding: 6px 20px 12px; flex-shrink: 0; }
  .sheet-title { font-size: 17px; font-weight: 600; color: var(--ink); }
  .sheet-x { background: none; border: none; color: var(--ink-3); cursor: pointer; font-size: 22px; line-height: 1; padding: 4px; }

  /* 左侧会话抽屉 */
  .drawer-overlay { align-items: stretch; justify-content: flex-start; }
  .drawer { width: 82%; max-width: 340px; height: 100%; background: var(--bg); display: flex; flex-direction: column; transform: translateX(-100%); transition: transform .26s cubic-bezier(.22,.61,.36,1); box-shadow: 8px 0 40px rgba(36,31,25,0.16); padding-top: var(--safe-top); }
  .drawer-overlay.show .drawer { transform: translateX(0); }
  .drawer-head { display: flex; align-items: center; justify-content: space-between; padding: 16px 12px 12px 20px; flex-shrink: 0; }
  .drawer-title { font-size: 19px; }
  .session-list { flex: 1; overflow-y: auto; padding: 4px 10px; }
  .session-list::-webkit-scrollbar { width: 0; }
  .session-row { display: flex; align-items: center; gap: 6px; padding: 11px 10px; border-radius: 12px; cursor: pointer; }
  .session-row:active { background: var(--accent-weak); }
  .session-row.sel { background: var(--accent-weak); }
  .sr-main { flex: 1; min-width: 0; }
  .sr-title { font-size: 14.5px; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .session-row.sel .sr-title { color: var(--accent); font-weight: 600; }
  .sr-time { font-size: 11px; color: var(--ink-3); margin-top: 2px; }
  .sr-btn { background: none; border: none; color: var(--ink-3); cursor: pointer; width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; opacity: 0; transition: opacity .15s; }
  .session-row.sel .sr-btn, .session-row:active .sr-btn { opacity: 1; }
  .sr-btn:active { background: var(--accent-weak); color: var(--accent); }
  .sr-btn svg { width: 16px; height: 16px; }
  .list-empty-mini { padding: 30px 12px; text-align: center; color: var(--ink-3); font-size: 13px; }
  .drawer-foot { flex-shrink: 0; border-top: 1px solid var(--line); padding: 8px 12px calc(8px + var(--safe-bottom)); }
  .foot-row { width: 100%; display: flex; align-items: center; gap: 10px; background: none; border: none; cursor: pointer; color: var(--ink-2); font-size: 14.5px; padding: 12px 8px; border-radius: 12px; }
  .foot-row:active { background: var(--accent-weak); color: var(--accent); }
  .foot-row svg { width: 19px; height: 19px; }

  /* 设置表单 */
  .form { flex: 1; min-height: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 0 20px; display: flex; flex-direction: column; }
  .form > * { flex-shrink: 0; }   /* 别把 textarea 等压扁，超出就让 .form 滚动 */
  .field-label { font-size: 11.5px; color: var(--ink-3); letter-spacing: .04em; text-transform: uppercase; margin-top: 14px; margin-bottom: 4px; }
  .field { width: 100%; background: var(--card); border: 1px solid var(--line); border-radius: var(--radius-sm); color: var(--ink); font-size: 14.5px; padding: 12px 14px; outline: none; font-family: inherit; transition: border-color .15s; }
  .field:focus { border-color: var(--accent-line); }
  textarea.field { resize: none; height: 84px; line-height: 1.5; }
  input.field.mono { font-family: ui-monospace, "SF Mono", Menlo, monospace; letter-spacing: .02em; }
  .toggle-row { display: flex; align-items: center; justify-content: space-between; background: var(--card); border: 1px solid var(--line); border-radius: var(--radius-sm); padding: 12px 14px; margin-top: 16px; }
  .toggle-row .tg-main { font-size: 14.5px; color: var(--ink); }
  .toggle-row .tg-sub { font-size: 12px; color: var(--ink-3); margin-top: 2px; }
  .switch { position: relative; width: 46px; height: 27px; flex-shrink: 0; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; inset: 0; cursor: pointer; background: var(--line); border-radius: 27px; transition: background .2s; }
  .slider::before { content: ''; position: absolute; height: 21px; width: 21px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: transform .2s; box-shadow: 0 1px 3px rgba(0,0,0,.2); }
  .switch input:checked + .slider { background: var(--accent); }
  .switch input:checked + .slider::before { transform: translateX(19px); }
  .btn-primary { background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 15px; font-weight: 600; padding: 13px; cursor: pointer; margin-top: 18px; transition: opacity .15s, transform .1s; }
  .btn-primary:active { transform: scale(.99); opacity: .92; }
  .form-note { font-size: 11.5px; color: var(--ink-3); line-height: 1.5; margin-top: 12px; text-align: center; }

  /* 模型选择 */
  .search-wrap { padding: 0 20px 8px; flex-shrink: 0; }
  .search-box { width: 100%; background: var(--card); border: 1px solid var(--line); border-radius: 999px; padding: 10px 16px; outline: none; color: var(--ink); font-size: 14.5px; font-family: inherit; }
  .search-box:focus { border-color: var(--accent-line); }
  .model-list { flex: 1; min-height: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 0 12px 4px; }
  .list-section { font-size: 11px; color: var(--ink-3); letter-spacing: .05em; text-transform: uppercase; padding: 12px 8px 6px; }
  .model-row { display: flex; align-items: center; gap: 10px; padding: 11px 8px; border-radius: 12px; cursor: pointer; }
  .model-row:active, .model-row.sel { background: var(--accent-weak); }
  .mr-main { flex: 1; min-width: 0; }
  .mr-name { font-size: 14.5px; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .mr-id { font-size: 11.5px; color: var(--ink-3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
  .mr-badge { font-size: 10px; color: var(--accent); background: var(--accent-weak); border-radius: 6px; padding: 2px 6px; flex-shrink: 0; }
  .mr-check { color: var(--accent); flex-shrink: 0; display: flex; opacity: 0; }
  .model-row.sel .mr-check { opacity: 1; }
  .list-empty { padding: 28px; text-align: center; color: var(--ink-3); font-size: 13px; }
  .list-loading { padding: 16px; text-align: center; color: var(--ink-3); font-size: 12.5px; }

  /* token 底栏 */
  .token-bar { flex-shrink: 0; text-align: center; font-size: 11px; color: var(--ink-3); padding: 5px 16px; background: var(--bg); border-top: 1px solid var(--line); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .token-bar b { color: var(--ink-2); font-weight: 600; }
  .token-bar .cache { color: var(--accent); }

  /* 记忆面板 */
  .btn-ghost { background: none; color: var(--ink-2); border: 1px solid var(--line); border-radius: var(--radius-sm); font-size: 14px; padding: 12px; cursor: pointer; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .btn-ghost:active { background: var(--accent-weak); color: var(--accent); }
  .btn-ghost:disabled { opacity: .5; }
  .field-head { display: flex; align-items: baseline; justify-content: space-between; margin-top: 16px; margin-bottom: 4px; }
  .field-head .field-label { margin: 0; }
  .field-head .count { font-size: 11px; color: var(--ink-3); }
  .comp-del { background: none; border: none; color: var(--ink-3); font-size: 11.5px; cursor: pointer; padding: 2px 4px; }
  .comp-del:active { color: var(--accent); }
  .comp-tabs { display: flex; gap: 6px; padding: 0 20px 10px; overflow-x: auto; flex-shrink: 0; }
  .comp-tabs::-webkit-scrollbar { display: none; }
  .comp-tab { flex-shrink: 0; background: var(--card); border: 1px solid var(--line); color: var(--ink-2); font-size: 13.5px; padding: 7px 14px; border-radius: 999px; cursor: pointer; white-space: nowrap; }
  .comp-tab.sel { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
  .comp-tab.comp-add { color: var(--accent); font-weight: 700; padding: 7px 12px; }
  .lock-tag { font-size: 10px; color: var(--accent); background: var(--accent-weak); border-radius: 5px; padding: 1px 6px; margin-left: 6px; letter-spacing: .02em; text-transform: none; }
  textarea.field.tall { height: 160px; }
  textarea.field.mem { height: 120px; }
  textarea.field.persona { height: 110px; }
  .mem-divider { border: none; border-top: 1px solid var(--line); margin: 18px 0 2px; }
  .mem-hint { font-size: 11.5px; color: var(--ink-3); line-height: 1.5; margin-top: 6px; }
  .distill-status { font-size: 12px; color: var(--accent); text-align: center; margin-top: 8px; min-height: 15px; }
  .hidden { display: none !important; }

  @media (prefers-reduced-motion: reduce) { * { transition: none !important; animation: none !important; scroll-behavior: auto !important; } }
</style>
</head>
<body>

<div class="header" id="header" style="display:none">
  <button class="icon-btn" title="对话" onclick="openDrawer()" aria-label="对话列表">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M4 7h16M4 12h16M4 17h16"/></svg>
  </button>
  <button class="model-pill" id="model-pill" onclick="openPicker()" aria-label="切换模型">
    <span class="pill-dot"></span>
    <span class="pill-name" id="pill-name">模型</span>
    <span class="pill-sub" id="pill-sub">· OpenRouter</span>
    <span class="pill-chev"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 9l6 6 6-6"/></svg></span>
  </button>
  <button class="icon-btn" title="新对话" onclick="newSession()" aria-label="新对话">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
  </button>
</div>

<div class="chat" id="chat" style="display:none"></div>

<div class="token-bar" id="token-bar" style="display:none"></div>

<div class="input-bar" id="input-bar" style="display:none">
  <div class="input-wrap">
    <textarea id="msg-input" rows="1" placeholder="说点什么…" oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
  </div>
  <button class="send-btn" id="send-btn" onclick="onSend()" aria-label="发送">
    <svg id="send-ic" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
  </button>
</div>

<!-- 会话抽屉 -->
<div class="overlay drawer-overlay" id="drawer-overlay">
  <div class="drawer">
    <div class="drawer-head">
      <span class="drawer-title serif">对话</span>
      <button class="icon-btn" onclick="newSession()" aria-label="新对话">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      </button>
    </div>
    <div class="comp-tabs" id="drawer-companions" style="padding:0 12px 10px"></div>
    <div class="session-list" id="session-list"></div>
    <div class="drawer-foot">
      <button class="foot-row" onclick="openMemory()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M20.8 5.6a5 5 0 00-7-.1L12 7l-1.8-1.5a5 5 0 00-7 7.1L12 21l8.8-8.4a5 5 0 000-7z"/></svg>
        记忆
      </button>
      <button class="foot-row" onclick="openSettings()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 11-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 110-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 114 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 110 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        设置
      </button>
    </div>
  </div>
</div>

<!-- 设置 -->
<div class="overlay" id="setup-overlay">
  <div class="sheet">
    <div class="grabber"></div>
    <div class="sheet-head">
      <div class="sheet-title serif">islet</div>
      <button class="sheet-x" id="setup-x" onclick="closeSettings()">×</button>
    </div>
    <div class="form">
      <div class="field-label">OpenRouter API Key</div>
      <input class="field mono" id="api-key-input" type="password" placeholder="sk-or-..." autocomplete="off" spellcheck="false">
      <div class="field-label">System Prompt（可留空）</div>
      <textarea class="field" id="system-input" placeholder="你是…"></textarea>
      <div class="toggle-row">
        <div>
          <div class="tg-main">显示思考过程</div>
          <div class="tg-sub">支持的模型会请求并展示推理</div>
        </div>
        <label class="switch"><input type="checkbox" id="reason-toggle" checked><span class="slider"></span></label>
      </div>
      <div class="field-label">外观</div>
      <div class="comp-tabs" id="theme-tabs" style="padding:6px 0 0">
        <button type="button" class="comp-tab" data-mode="auto" onclick="setTheme('auto')">跟随系统</button>
        <button type="button" class="comp-tab" data-mode="light" onclick="setTheme('light')">浅色</button>
        <button type="button" class="comp-tab" data-mode="dark" onclick="setTheme('dark')">深色</button>
      </div>
      <div class="field-label">色调</div>
      <div class="comp-tabs" id="palette-tabs" style="padding:6px 0 0">
        <button type="button" class="comp-tab" data-mode="warm" onclick="setPalette('warm')">暖砂</button>
        <button type="button" class="comp-tab" data-mode="cool" onclick="setPalette('cool')">冰蓝</button>
      </div>
      <button class="btn-primary" onclick="saveSetup()">保存</button>
      <div class="form-note">Key 只保存在本机浏览器，不会上传到任何服务器</div>
    </div>
  </div>
</div>

<!-- 模型选择 -->
<div class="overlay" id="picker-overlay">
  <div class="sheet">
    <div class="grabber"></div>
    <div class="sheet-head">
      <div class="sheet-title">选择模型</div>
      <button class="sheet-x" onclick="closePicker()">×</button>
    </div>
    <div class="search-wrap">
      <input class="search-box" id="model-search" placeholder="搜索模型，如 glm / opus / gpt…" oninput="renderModelList(this.value)" spellcheck="false">
    </div>
    <div class="model-list" id="model-list"></div>
  </div>
</div>

<!-- 记忆（按角色分开） -->
<div class="overlay" id="memory-overlay">
  <div class="sheet">
    <div class="grabber"></div>
    <div class="sheet-head">
      <div class="sheet-title">记忆</div>
      <button class="sheet-x" onclick="closeMemory()">×</button>
    </div>
    <div class="form">
      <div class="field-label" style="margin-top:8px">关于你 · Lea<span class="lock-tag">所有角色共享</span></div>
      <textarea class="field tall" id="about-input" placeholder="关于你的背景，跟谁聊都会读到…" spellcheck="false"></textarea>
      <div class="mem-hint">你的档案，所有角色共用，模型不会自动改它。</div>

      <hr class="mem-divider">
      <div class="field-label">角色（各自独立的人设与记忆）</div>
      <div class="comp-tabs" id="companion-tabs" style="padding:6px 0 4px"></div>

      <div class="field-head">
        <div class="field-label">角色名称</div>
        <button class="comp-del" onclick="deleteCompanion(editingCompanionId)" aria-label="删除该角色">删除角色</button>
      </div>
      <input class="field" id="companion-name-input" placeholder="给 TA 起个名字…" spellcheck="false">

      <div class="field-label">这个角色是谁（可留空，让它慢慢长）</div>
      <textarea class="field persona" id="persona-input" placeholder="想设定就写；不写就从空白开始，在相处里慢慢长出脾气…" spellcheck="false"></textarea>
      <div class="mem-hint">只属于这个角色。留空也行——空白起步、靠记忆长成 TA 自己。</div>

      <div class="field-head">
        <div class="field-label">积累的记忆</div>
        <span class="count" id="mem-count">空</span>
      </div>
      <textarea class="field mem" id="mem-input" placeholder="跟这个角色相处中慢慢攒下来的（可随时手动编辑/删除）…" oninput="updateMemCount()" spellcheck="false"></textarea>
      <button class="btn-ghost" id="distill-btn" onclick="distillNow()">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.6 4.6L18 9l-4.4 1.4L12 15l-1.6-4.6L6 9l4.4-1.4z"/></svg>
        从当前对话提炼记忆
      </button>
      <div class="distill-status" id="distill-status"></div>

      <div class="toggle-row">
        <div>
          <div class="tg-main">自动累积记忆</div>
          <div class="tg-sub">离开对话时自动提炼并合并进来</div>
        </div>
        <label class="switch"><input type="checkbox" id="autodistill-toggle" checked><span class="slider"></span></label>
      </div>

      <button class="btn-primary" onclick="saveMemory()">保存</button>
      <div class="form-note">记忆只存在本机浏览器，随时可改可删；对话时用的是当前角色的人设与记忆</div>
    </div>
  </div>
</div>

<script>
  const API_URL    = 'https://openrouter.ai/api/v1/chat/completions';
  const MODELS_URL = 'https://openrouter.ai/api/v1/models';
  const $ = id => document.getElementById(id);

  const FALLBACK_MODELS = [
    { id:'anthropic/claude-opus-4.6',     name:'Claude Opus 4.6',   reason:true },
    { id:'anthropic/claude-sonnet-4.6',   name:'Claude Sonnet 4.6', reason:true },
    { id:'anthropic/claude-haiku-4.5',    name:'Claude Haiku 4.5',  reason:true },
    { id:'openai/gpt-5.2',                name:'GPT-5.2',           reason:true },
    { id:'openai/gpt-5.2-pro',            name:'GPT-5.2 Pro',       reason:true },
    { id:'openai/gpt-5-mini',             name:'GPT-5 Mini',        reason:true },
    { id:'google/gemini-3-flash-preview', name:'Gemini 3 Flash',    reason:true },
    { id:'google/gemini-3.1-pro-preview', name:'Gemini 3.1 Pro',    reason:true },
    { id:'deepseek/deepseek-r1',          name:'DeepSeek R1',       reason:true },
    { id:'deepseek/deepseek-v4-pro',      name:'DeepSeek V4 Pro',   reason:true },
    { id:'z-ai/glm-5.2',                  name:'GLM-5.2',           reason:true },
    { id:'z-ai/glm-5.1',                  name:'GLM-5.1',           reason:true },
    { id:'moonshotai/kimi-k2.5',          name:'Kimi K2.5',         reason:true },
    { id:'x-ai/grok-4',                   name:'Grok 4',            reason:true },
  ];
  const FAVORITES = ['anthropic/claude-opus-4.6','anthropic/claude-sonnet-4.6','anthropic/claude-haiku-4.5','openai/gpt-5.2','google/gemini-3-flash-preview','deepseek/deepseek-r1','z-ai/glm-5.2'];

  let apiKey = '', systemPrompt = '', reasoningEnabled = true;
  let selectedModel = 'anthropic/claude-sonnet-4.6';
  let catalog = [], catalogMap = {};

  /* ---------- 主题 ---------- */
  let themeMode = localStorage.getItem('islet_theme') || 'auto';       // auto | light | dark
  let paletteMode = localStorage.getItem('islet_palette') || 'warm';   // warm | cool
  function effectiveTheme() { return themeMode !== 'auto' ? themeMode : (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'); }
  function applyTheme() {
    const el = document.documentElement;
    if (themeMode === 'auto') el.removeAttribute('data-theme');
    else el.setAttribute('data-theme', themeMode);
    if (paletteMode === 'warm') el.removeAttribute('data-palette');
    else el.setAttribute('data-palette', paletteMode);
    const meta = document.getElementById('meta-theme');
    const barColor = { 'warm-light': '#F4F0E8', 'warm-dark': '#221E1A', 'cool-light': '#EFF2F5', 'cool-dark': '#171B20' };
    if (meta) meta.content = barColor[paletteMode + '-' + effectiveTheme()];
  }
  function setTheme(m) { themeMode = m; localStorage.setItem('islet_theme', m); applyTheme(); renderThemeTabs(); }
  function setPalette(m) { paletteMode = m; localStorage.setItem('islet_palette', m); applyTheme(); renderThemeTabs(); }
  function renderThemeTabs() {
    const t = document.getElementById('theme-tabs');
    if (t) t.querySelectorAll('.comp-tab').forEach(b => b.classList.toggle('sel', b.dataset.mode === themeMode));
    const p = document.getElementById('palette-tabs');
    if (p) p.querySelectorAll('.comp-tab').forEach(b => b.classList.toggle('sel', b.dataset.mode === paletteMode));
  }
  applyTheme();
  matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => { if (themeMode === 'auto') applyTheme(); });

  let sessions = [];        // [{id,title,updated}]
  let currentId = null;
  let messages = [];        // 当前会话消息
  let isLoading = false, currentAbort = null;

  let companions = [];          // [{id,name,persona,mem,autoDistill}]
  let activeCompanionId = null; // 当前正在对话的角色（跟随当前会话）
  let editingCompanionId = null;// 记忆面板里正在编辑的角色（与对话解耦）

  /* ---------- 初始化 ---------- */
  window.onload = () => {
    apiKey = localStorage.getItem('or_key') || '';
    systemPrompt = localStorage.getItem('or_system') || '';
    selectedModel = localStorage.getItem('or_model') || 'anthropic/claude-sonnet-4.6';
    reasoningEnabled = localStorage.getItem('or_reasoning') !== 'off';
    loadCompanions();

    loadCatalogCache(); buildCatalogMap();
    loadSessions();
    if (currentId) { const sc = sessionCompanion(currentId); if (sc) { activeCompanionId = sc.id; localStorage.setItem('islet_active_companion', sc.id); } }

    if (apiKey) { showMain(); renderAll(); }
    else openSettings(true);
    fetchModels();

    // 代码块复制（事件委托）
    $('chat').addEventListener('click', e => {
      const btn = e.target.closest('.code-copy');
      if (!btn) return;
      const code = btn.closest('.code-wrap').querySelector('pre code');
      if (code) navigator.clipboard.writeText(code.textContent).then(() => {
        btn.textContent = '已复制'; setTimeout(() => btn.textContent = '复制', 1200);
      }).catch(() => {});
    });
  };

  function showMain() {
    $('header').style.display = 'flex';
    $('chat').style.display = 'flex';
    $('input-bar').style.display = 'flex';
    if (!currentId) ensureSession();
    updatePill();
  }

  /* ---------- 多会话存储 ---------- */
  function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }
  function deriveTitle(msgs) {
    const u = msgs.find(m => m.role === 'user');
    if (!u) return '新对话';
    return u.content.split('\n')[0].slice(0, 24).trim() || '新对话';
  }
  function loadSessionMsgs(id) {
    try { return JSON.parse(localStorage.getItem('islet_s_' + id) || '[]'); } catch (e) { return []; }
  }
  function saveSessionMsgs(id, msgs) {
    try { localStorage.setItem('islet_s_' + id, JSON.stringify(msgs.slice(-120))); } catch (e) {}
  }
  function saveIndex() { try { localStorage.setItem('islet_idx', JSON.stringify(sessions)); } catch (e) {} }

  /* ---------- 角色（记忆各自独立） ---------- */
  function loadCompanions() {
    let raw = null;
    try { raw = JSON.parse(localStorage.getItem('islet_companions') || 'null'); } catch (e) { raw = null; }
    if (Array.isArray(raw) && raw.length) {
      if (raw.some(c => 'about' in c)) {   // 旧结构迁移：about 实为"关于用户"，提升为共享；角色改用 persona
        if (!(localStorage.getItem('islet_about') || '').trim()) {
          const firstAbout = (raw.find(c => (c.about || '').trim()) || {}).about || '';
          if (firstAbout.trim()) localStorage.setItem('islet_about', firstAbout.trim());
        }
        raw = raw.map(c => ({ id: c.id || genId(), name: c.name || '角色', persona: (c.persona || '').trim(), mem: c.mem || '', autoDistill: c.autoDistill !== false }));
        companions = raw; saveCompanions();
      } else {
        companions = raw;
      }
    } else {                               // 全新/更早版本：建一个角色，旧记忆迁入；islet_about 保留为共享
      const oldMem = localStorage.getItem('islet_mem') || '';
      companions = [{ id: genId(), name: '角色一', persona: '', mem: oldMem, autoDistill: true }];
      saveCompanions();
      if (oldMem) localStorage.removeItem('islet_mem');
      localStorage.removeItem('islet_autodistill');
    }
    activeCompanionId = localStorage.getItem('islet_active_companion');
    if (!activeCompanionId || !companions.find(c => c.id === activeCompanionId)) activeCompanionId = companions[0].id;
  }
  function sharedAbout() { return (localStorage.getItem('islet_about') || '').trim(); }
  function editingCompanion() { return companions.find(c => c.id === editingCompanionId) || activeCompanion(); }
  function sessionCompanion(sid) {
    const s = sessions.find(x => x.id === sid);
    const c = s && s.companionId ? companions.find(x => x.id === s.companionId) : null;
    return c || activeCompanion() || companions[0];
  }
  // 进入某角色的空间：切到 TA 最近的会话，没有就新建一个
  function enterCompanion(cid) {
    activeCompanionId = cid;
    localStorage.setItem('islet_active_companion', cid);
    const theirs = sessions.filter(s => (s.companionId || companions[0].id) === cid).sort((a, b) => b.updated - a.updated);
    if (theirs.length) { currentId = theirs[0].id; localStorage.setItem('islet_cur', currentId); messages = loadSessionMsgs(currentId); }
    else {
      const nid = genId();
      sessions.unshift({ id: nid, title: '新对话', updated: Date.now(), companionId: cid });
      currentId = nid; messages = []; saveIndex(); saveSessionMsgs(nid, []); localStorage.setItem('islet_cur', nid);
    }
  }
  function switchCompanion(id) {
    if (id === activeCompanionId) { return; }
    const prevId = currentId, snap = messages.slice();
    if (currentAbort) currentAbort.abort();
    maybeAutoDistill(prevId, snap);
    isLoading = false; setLoading(false);
    enterCompanion(id);
    renderAll(); renderSessions(); renderDrawerCompanions(); updatePill();
  }
  function renderDrawerCompanions() {
    const wrap = $('drawer-companions');
    if (!wrap) return;
    wrap.innerHTML = companions.map(c => {
      const st = distillState[c.id];
      const mark = st && st.st === 'running' ? ' <span style="opacity:.6">…</span>'
                 : st && st.st === 'fail'    ? ' <span style="color:var(--accent);font-weight:700">!</span>' : '';
      return `<button type="button" class="comp-tab ${c.id === activeCompanionId ? 'sel' : ''}" onclick="switchCompanion('${c.id}')">${esc(c.name)}${mark}</button>`;
    }).join('');
  }
  function saveCompanions() { try { localStorage.setItem('islet_companions', JSON.stringify(companions)); } catch (e) {} }
  function activeCompanion() { return companions.find(c => c.id === activeCompanionId) || companions[0]; }
  function setActiveCompanion(id) {
    if (!companions.find(c => c.id === id)) return;
    activeCompanionId = id;
    localStorage.setItem('islet_active_companion', id);
    updatePill();
  }
  function addCompanion() {
    const name = (prompt('给新角色起个名字', '') || '').trim();
    if (!name) return;
    const c = { id: genId(), name, persona: '', mem: '', autoDistill: true };
    companions.push(c); saveCompanions();
    editingCompanionId = c.id;            // 只切编辑态，不影响正在聊的
    renderCompanionTabs(); loadMemoryForm();
  }
  function renameCompanion(id) {
    const c = companions.find(x => x.id === id);
    if (!c) return;
    const v = prompt('重命名角色', c.name);
    if (v == null) return;
    c.name = v.trim() || c.name;
    saveCompanions(); renderCompanionTabs(); renderDrawerCompanions(); updatePill();
  }
  function deleteCompanion(id) {
    if (companions.length <= 1) { alert('至少保留一个角色'); return; }
    const c = companions.find(x => x.id === id);
    if (!confirm('删除角色「' + (c ? c.name : '') + '」？TA 的人设、记忆和所有对话都会一并删除，不可恢复。')) return;
    sessions.filter(s => s.companionId === id).forEach(s => localStorage.removeItem('islet_s_' + s.id));
    sessions = sessions.filter(s => s.companionId !== id);
    companions = companions.filter(x => x.id !== id);
    saveCompanions(); saveIndex();
    const fallback = companions[0].id;
    if (editingCompanionId === id) editingCompanionId = fallback;
    if (activeCompanionId === id) { if (currentAbort) currentAbort.abort(); enterCompanion(fallback); renderAll(); }
    renderCompanionTabs(); loadMemoryForm(); renderDrawerCompanions(); renderSessions(); updatePill();
  }

  function loadSessions() {
    try { sessions = JSON.parse(localStorage.getItem('islet_idx') || '[]'); } catch (e) { sessions = []; }
    if (!sessions.length) {           // 迁移旧的单一历史
      let old = null;
      try { old = JSON.parse(localStorage.getItem('or_history') || 'null'); } catch (e) {}
      if (old && old.length) {
        const id = genId();
        sessions = [{ id, title: deriveTitle(old), updated: Date.now(), companionId: companions[0].id }];
        saveSessionMsgs(id, old); saveIndex();
        localStorage.setItem('islet_cur', id);
        localStorage.removeItem('or_history');
      }
    }
    const firstC = companions[0].id;   // 老会话没有 companionId 的，归到第一个角色
    let changed = false;
    sessions.forEach(s => { if (!s.companionId) { s.companionId = firstC; changed = true; } });
    if (changed) saveIndex();
    currentId = localStorage.getItem('islet_cur');
    if (!currentId || !sessions.find(s => s.id === currentId)) currentId = sessions[0] ? sessions[0].id : null;
    messages = currentId ? loadSessionMsgs(currentId) : [];
  }

  function ensureSession() {
    if (currentId && sessions.find(s => s.id === currentId)) return;
    const id = genId();
    sessions.unshift({ id, title: '新对话', updated: Date.now(), companionId: activeCompanionId });
    currentId = id; messages = [];
    saveIndex(); saveSessionMsgs(id, []);
    localStorage.setItem('islet_cur', id);
  }

  function saveCurrent() {
    if (!currentId) return;
    saveSessionMsgs(currentId, messages);
    const s = sessions.find(x => x.id === currentId);
    if (s) {
      s.updated = Date.now();
      if (s.title === '新对话') s.title = deriveTitle(messages);
      sessions.sort((a, b) => b.updated - a.updated);
      saveIndex();
      if ($('drawer-overlay').classList.contains('show')) renderSessions();
    }
  }

  function newSession() {
    const prevId = currentId, snap = messages.slice();
    if (currentAbort) currentAbort.abort();
    maybeAutoDistill(prevId, snap);
    const id = genId();
    sessions.unshift({ id, title: '新对话', updated: Date.now(), companionId: activeCompanionId });
    currentId = id; messages = [];
    saveIndex(); saveSessionMsgs(id, []);
    localStorage.setItem('islet_cur', id);
    renderAll(); renderSessions();
    closeDrawer();
    $('msg-input').focus();
  }

  function switchSession(id) {
    if (id === currentId) { closeDrawer(); return; }
    const prevId = currentId, snap = messages.slice();
    if (currentAbort) currentAbort.abort();
    maybeAutoDistill(prevId, snap);
    isLoading = false; setLoading(false);
    currentId = id;
    localStorage.setItem('islet_cur', id);
    messages = loadSessionMsgs(id);
    const s = sessions.find(x => x.id === id);
    if (s && s.companionId && s.companionId !== activeCompanionId) { activeCompanionId = s.companionId; localStorage.setItem('islet_active_companion', s.companionId); updatePill(); }
    renderAll(); renderSessions(); renderDrawerCompanions();
    closeDrawer();
  }

  function deleteSession(id) {
    const s = sessions.find(x => x.id === id);
    if (!confirm('删除「' + (s ? s.title : '此对话') + '」？不可恢复。')) return;
    localStorage.removeItem('islet_s_' + id);
    sessions = sessions.filter(x => x.id !== id);
    saveIndex();
    if (id === currentId) {
      if (currentAbort) currentAbort.abort();
      const theirs = sessions.filter(x => (x.companionId || companions[0].id) === activeCompanionId).sort((a, b) => b.updated - a.updated);
      if (theirs.length) { currentId = theirs[0].id; localStorage.setItem('islet_cur', currentId); messages = loadSessionMsgs(currentId); }
      else { currentId = null; ensureSession(); }
      renderAll();
    }
    renderSessions();
  }

  function renameSession(id) {
    const s = sessions.find(x => x.id === id);

  async function fetchModels() {
    try {
      const res = await fetch(MODELS_URL);
      if (!res.ok) return;

      if (!Array.isArray(j.data)) return;
      catalog = j.data.map(m => ({
        id: m.id, name: cleanName(m.name || m.id),
        reason: (m.supported_parameters || []).some(p => p === 'reasoning' || p === 'include_reasoning'),
        ctx: m.context_length || 0,

      buildCatalogMap(); saveCatalogCache(); updatePill();
      if ($('picker-overlay').classList.contains('show')) renderModelList($('model-search').value);
    } catch (e) {}
  }
  function effectiveCatalog() { return catalog.length ? catalog : FALLBACK_MODELS.map(m => ({ ...m, ctx: 0 })); }
  function buildCatalogMap() {
    catalogMap = {};
    FALLBACK_MODELS.forEach(m => catalogMap[m.id] = { name: m.name, reason: m.reason });
    effectiveCatalog().forEach(m => catalogMap[m.id] = { name: m.name, reason: m.reason });
  }
  function saveCatalogCache() { try { localStorage.setItem('or_models', JSON.stringify(catalog.map(m => ({ i: m.id, n: m.name, r: m.reason ? 1 : 0, c: m.ctx })))); } catch (e) {} }
  function loadCatalogCache() { try { const r = localStorage.getItem('or_models'); if (r) catalog = JSON.parse(r).map(m => ({ id: m.i, name: m.n, reason: !!m.r, ctx: m.c || 0 })); } catch (e) { catalog = []; } }
  function cleanName(n) { return n.replace(/^[^:]+:\s*/, '').trim(); }
  function prettyName(id) { return (catalogMap[id] && catalogMap[id].name) ? catalogMap[id].name : (id.split('/').pop() || id); }
  function modelSupportsReasoning(id) {
    if (catalogMap[id] && typeof catalogMap[id].reason === 'boolean') return catalogMap[id].reason;
    return /(opus|sonnet|o1|o3|o4|gpt-5|deepseek-r|glm-[5-9]|glm-4\.[6-9]|gemini-3|gemini-2\.5|kimi|minimax|seed-1\.6|qwen.*think|think|reason)/i.test(id);

  /* ---------- Markdown ---------- */
  function esc(s) { return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

  function renderInline(s) {
    const codes = [];
    s = s.replace(/`([^`]+)`/g, (m, c) => { codes.push(c); return '\u0001' + (codes.length - 1) + '\u0001'; });
    s = s.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, (m, t, u) => /^https?:\/\//i.test(u) ? `<a href="${u}" target="_blank" rel="noopener noreferrer">${t}</a>` : m);
    s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>').replace(/__([^_]+)__/g, '<strong>$1</strong>');
    s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>').replace(/(^|[^_\w])_([^_\n]+)_/g, '$1<em>$2</em>');
    s = s.replace(/\u0001(\d+)\u0001/g, (m, i) => `<code>${codes[+i]}</code>`);
    return s;
  }
  function renderCodeBlock(b) {
    const code = esc((b.code || '').replace(/\n$/, ''));
    return `<div class="code-wrap"><div class="code-head"><span class="code-lang">${esc(b.lang || 'code')}</span><button class="code-copy" type="button">复制</button></div><pre><code>${code}</code></pre></div>`;
  }
  function renderMarkdown(src) {
    if (!src) return '';
    let text = src.replace(/\r\n/g, '\n');
    const blocks = [];
    text = text.replace(/```([^\n`]*)\n?([\s\S]*?)```/g, (m, lang, code) => { blocks.push({ lang: lang.trim(), code }); return '\u0000' + (blocks.length - 1) + '\u0000'; });
    const open = text.indexOf('```');                 // 流式未闭合代码块
    if (open >= 0) {
      const after = text.slice(open + 3), nl = after.indexOf('\n');
      blocks.push({ lang: nl >= 0 ? after.slice(0, nl).trim() : after.trim(), code: nl >= 0 ? after.slice(nl + 1) : '' });
      text = text.slice(0, open) + '\u0000' + (blocks.length - 1) + '\u0000';
    }
    text = esc(text);
    const lines = text.split('\n');
    let html = '', listType = null, para = [];
    const flushP = () => { if (para.length) { html += '<p>' + renderInline(para.join('<br>')) + '</p>'; para = []; } };
    const closeL = () => { if (listType) { html += '</' + listType + '>'; listType = null; } };
    for (const raw of lines) {
      const t = raw.trim();
      const cb = t.match(/^\u0000(\d+)\u0000$/);
      if (cb) { flushP(); closeL(); html += renderCodeBlock(blocks[+cb[1]]); continue; }
      if (t === '') { flushP(); closeL(); continue; }
      if (/^(-{3,}|_{3,}|\*{3,})$/.test(t)) { flushP(); closeL(); html += '<hr>'; continue; }
      let h = t.match(/^(#{1,6})\s+(.*)$/);
      if (h) { flushP(); closeL(); const l = h[1].length; html += `<h${l}>` + renderInline(h[2]) + `</h${l}>`; continue; }
      let q = t.match(/^&gt;\s?(.*)$/);
      if (q) { flushP(); closeL(); html += '<blockquote>' + renderInline(q[1]) + '</blockquote>'; continue; }
      let u = t.match(/^[-*+]\s+(.*)$/);
      if (u) { flushP(); if (listType !== 'ul') { closeL(); html += '<ul>'; listType = 'ul'; } html += '<li>' + renderInline(u[1]) + '</li>'; continue; }
      let o = t.match(/^\d+[.)]\s+(.*)$/);
      if (o) { flushP(); if (listType !== 'ol') { closeL(); html += '<ol>'; listType = 'ol'; } html += '<li>' + renderInline(o[1]) + '</li>'; continue; }
      if (listType) closeL();
      para.push(raw.replace(/\s+$/, ''));
    }
    flushP(); closeL();
    return html;
  }

  /* ---------- 流式核心 ---------- */
  function authHeaders() { return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}`, 'HTTP-Referer': location.href, 'X-Title': 'islet' }; }
  function buildSystemContent(sid) {
    const about = sharedAbout();
    const c = sessionCompanion(sid == null ? currentId : sid);
    const persona = (c.persona || '').trim();
    const mem = (c.mem || '').trim();
    const parts = [];
    if (about || persona || mem) {
      let block = "You are talking with a real person — this is a genuine, ongoing relationship, not a character to play or a script to perform. Just be yourself and be present with them.";
      if (about) block += "\n\n## About the person you're talking with\n" + about;
      if (persona) block += "\n\n## Who you are to them\n" + persona;
      if (mem) block += "\n\n## What you remember from your time together\n" + mem;
      parts.push(block);
    }
    if (systemPrompt) parts.push(systemPrompt);
    return parts.join("\n\n");
  }
  function buildApiMessages(msgList, sid) {
    const list = msgList || messages;
    const sys = buildSystemContent(sid);
    return [
      ...(sys ? [{ role: 'system', content: sys }] : []),
      ...list.filter(m => m.role !== 'system').map(m => ({ role: m.role, content: m.content })),
    ];
  }
  function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

  // Anthropic 的 prompt caching 要求 cache_control 放在消息内容块上（顶层字段会被忽略）。
  // 断点打在 system 和最后一条消息上：下一轮请求时，之前的整段前缀都能命中缓存。
  // ⚠️ 此判断依赖 OpenRouter 的模型 id 格式（anthropic/claude-...）；若换直连官方 API 需同步修改
  function withCacheBreakpoints(model, msgs) {
    if (!model.startsWith('anthropic/')) return msgs;
    const ok = m => typeof m.content === 'string' && m.content;
    let lastIdx = -1;
    for (let i = msgs.length - 1; i >= 0; i--) { if (ok(msgs[i])) { lastIdx = i; break; } }
    return msgs.map((m, i) => (ok(m) && (m.role === 'system' || i === lastIdx))
      ? { role: m.role, content: [{ type: 'text', text: m.content, cache_control: { type: 'ephemeral' } }] }
      : m);
  }

  // 返回 {ended:'done'|'aborted'|'http'|'network', error?}
  async function streamCompletion(model, msgs, signal, onReason, onContent) {
    let gotContent = false, sawDone = false, usage = null;
    try {
      // max_tokens：OpenRouter 会按此值预扣余额，不设则按模型最大输出预估，余额少时会被拒
      const payload = { model, messages: withCacheBreakpoints(model, msgs), max_tokens: 8192, stream: true, stream_options: { include_usage: true } };
      if (reasoningEnabled && modelSupportsReasoning(model)) payload.reasoning = { enabled: true };
      const res = await fetch(API_URL, { method: 'POST', headers: authHeaders(), body: JSON.stringify(payload), signal });
      if (!res.ok) { const e = await res.json().catch(() => ({})); return { ended: 'http', error: (e && e.error && e.error.message) || ('HTTP ' + res.status) }; }
      const reader = res.body.getReader(); const dec = new TextDecoder(); let buf = '';
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += dec.decode(value, { stream: true });
        let nl;
        while ((nl = buf.indexOf('\n')) >= 0) {
          const line = buf.slice(0, nl); buf = buf.slice(nl + 1);
          const s = line.trim();
          if (!s || s.startsWith(':') || !s.startsWith('data:')) continue;
          const d = s.slice(5).trim();
          if (d === '[DONE]') { sawDone = true; break; }
          let json; try { json = JSON.parse(d); } catch (e) { continue; }
          if (json.usage) usage = json.usage;
          const delta = (json.choices && json.choices[0] && json.choices[0].delta) || {};
          let r = delta.reasoning;
          if (r == null && delta.reasoning_content) r = delta.reasoning_content;
          if (r == null && Array.isArray(delta.reasoning_details)) r = delta.reasoning_details.map(x => x.text || x.summary || '').join('');
          if (r) onReason(r);
          if (delta.content) { gotContent = true; onContent(delta.content); }
        }
        if (sawDone) break;
      }
      return (sawDone || gotContent) ? { ended: 'done', usage } : { ended: 'network', usage };
    } catch (e) {
      if (e.name === 'AbortError') return { ended: 'aborted', usage };
      return { ended: 'network', usage, error: e.message };
    }
  }

  function scheduleRender(h, get) {
    if (h._raf) return;
    h._raf = requestAnimationFrame(() => { h._raf = null; h.textEl.innerHTML = renderMarkdown(get()); maybeScroll(); });
  }
  function renderNow(h, text) { if (h._raf) { cancelAnimationFrame(h._raf); h._raf = null; } h.textEl.innerHTML = renderMarkdown(text); maybeScroll(); }

  function showBroken(h, onContinue, onRetry) {
    removeBroken(h);
    const box = document.createElement('div');
    box.className = 'broke';
    box.innerHTML = '<b>连接中断</b><span>已保留收到的部分</span>';
    const cont = document.createElement('button'); cont.textContent = '继续生成';
    const retry = document.createElement('button'); retry.textContent = '重新生成';
    cont.onclick = onContinue; retry.onclick = onRetry;
    box.appendChild(cont); box.appendChild(retry);
    h.row.appendChild(box); h._broke = box;
    maybeScroll();
  }
  function removeBroken(h) { if (h._broke) { h._broke.remove(); h._broke = null; } }

  /* ---------- 发送 / 生成 ---------- */
  function onSend() { if (isLoading) { if (currentAbort) currentAbort.abort(); return; } sendMessage(); }

  function sendMessage() {
    const input = $('msg-input');
    const text = input.value.trim();
    if (!text) return;
    input.value = ''; input.style.height = '';
    ensureSession();
    const t = nowTime();
    messages.push({ role: 'user', content: text, time: t });
    addUser(text, t);
    saveCurrent();
    generateAssistant();
  }

  async function generateAssistant() {
    const sid = currentId, model = selectedModel, msgsRef = messages;   // 快照，切走后不串台
    setLoading(true);
    const h = addAi('', '', null, model, nowTime(), false);
    h.textEl.classList.add('cursor');

    let contentText = '', reasoningText = '', thinkStart = null, firstContentAt = null, finalSec = null, timer = null;
    const startTimer = () => { timer = setInterval(() => { h.thinkLbl.textContent = `思考中… ${((performance.now() - thinkStart) / 1000).toFixed(1)}s`; }, 100); };
    const stopTimer = () => { if (timer) { clearInterval(timer); timer = null; } };
    const onReason = r => { if (contentText === '' && h.textEl.textContent) h.textEl.textContent = ''; if (thinkStart == null) { thinkStart = performance.now(); h.thinkEl.classList.remove('hidden'); startTimer(); } reasoningText += r; h.thinkBody.textContent = reasoningText; maybeScroll(); };
    const onContent = c => {
      if (firstContentAt == null) { firstContentAt = performance.now(); if (thinkStart != null) { stopTimer(); finalSec = (firstContentAt - thinkStart) / 1000; h.thinkLbl.textContent = `已思考 ${finalSec.toFixed(1)}s`; h.thinkEl.classList.remove('open'); } }
      contentText += c; scheduleRender(h, () => contentText);
    };

    let attempt = 0, lastUsage = null, myAbort = null;
    while (true) {
      myAbort = currentAbort = new AbortController();
      const res = await streamCompletion(model, buildApiMessages(msgsRef, sid), myAbort.signal, onReason, onContent);
      if (res.usage) lastUsage = res.usage;
      if (res.ended === 'aborted') break;
      if (res.ended === 'http') { stopTimer(); h.textEl.classList.remove('cursor'); h.textEl.classList.add('err'); h.textEl.textContent = `请求失败：${res.error}。检查 API Key、余额，或换个模型再试。`; break; }
      if (res.ended === 'done') break;
      // network：无正文时自动重试，否则交给用户
      if (contentText === '' && attempt < 2) {
        attempt++; stopTimer(); thinkStart = null; reasoningText = '';
        h.thinkEl.classList.add('hidden');
        h.textEl.textContent = `连接中断，重试中… (${attempt}/2)`;
        await delay(700 * attempt);
        if (myAbort.signal.aborted || currentAbort !== myAbort) break;   // 等待期间被停止或切走了
        continue;
      }
      showBroken(h, () => continueGen(h, model), () => retryGen(h));
      break;
    }

    stopTimer();
    h.textEl.classList.remove('cursor');
    if (contentText) renderNow(h, contentText);
    if (thinkStart != null && finalSec == null) { finalSec = ((firstContentAt || performance.now()) - thinkStart) / 1000; h.thinkLbl.textContent = `已思考 ${finalSec.toFixed(1)}s`; }
    if (currentAbort === myAbort) { setLoading(false); currentAbort = null; }   // 若已有新一轮生成，别覆盖它的状态
    if (lastUsage && sid === currentId) updateTokenBar(lastUsage);

    if (contentText || reasoningText) {
      const msg = { role: 'assistant', content: contentText, thinking: reasoningText || null, thinkSec: finalSec, model, time: h.row.querySelector('.t').textContent };
      if (sid === currentId) { messages.push(msg); saveCurrent(); }
      else if (sessions.find(s => s.id === sid)) { const old = loadSessionMsgs(sid); old.push(msg); saveSessionMsgs(sid, old); }   // 已切走也别丢；会话已删除则不写回
    }
    if (sid === currentId) $('msg-input').focus();
  }

  // 断点续写：把已收到的部分作为 assistant 预填，让模型接着写
  // 注意：预填（trailing assistant）并非所有模型都支持，不支持的模型可能从头重答导致内容重复
  async function continueGen(h, model) {
    const last = messages[messages.length - 1];
    if (!last || last.role !== 'assistant' || !last.content) { retryGen(h); return; }
    removeBroken(h);
    setLoading(true);
    h.textEl.classList.add('cursor');
    let contentText = last.content || '';
    const sid = currentId, msgsRef = messages;   // 快照，切走后不串台
    const onContent = c => { contentText += c; last.content = contentText; scheduleRender(h, () => contentText); };

    let myAbort = null;
    while (true) {
      myAbort = currentAbort = new AbortController();
      const res = await streamCompletion(model, buildApiMessages(msgsRef, sid), myAbort.signal, () => {}, onContent);
      if (res.ended === 'aborted') break;
      if (res.ended === 'http') { h.textEl.classList.remove('cursor'); showBroken(h, () => continueGen(h, model), () => retryGen(h)); break; }
      if (res.ended === 'done') break;
      showBroken(h, () => continueGen(h, model), () => retryGen(h));
      break;
    }
    h.textEl.classList.remove('cursor');
    renderNow(h, contentText);
    if (currentAbort === myAbort) { setLoading(false); currentAbort = null; }
    if (sid === currentId) { last.content = contentText; saveCurrent(); }
    else if (sessions.find(s => s.id === sid)) {   // 续写途中被切走：写回原会话，别丢
      const old = loadSessionMsgs(sid);
      if (old.length && old[old.length - 1].role === 'assistant') { old[old.length - 1].content = contentText; saveSessionMsgs(sid, old); }
    }
  }

  function retryGen(h) {
    removeBroken(h);
    if (messages.length && messages[messages.length - 1].role === 'assistant') messages.pop();
    if (h && h.row && h.row.parentNode) h.row.remove();
    saveCurrent();
    generateAssistant();
  }

  function setLoading(v) {
    isLoading = v;
    const btn = $('send-btn'), ic = $('send-ic');
    if (v) { btn.setAttribute('aria-label', '停止'); ic.outerHTML = '<svg id="send-ic" viewBox="0 0 24 24" fill="#fff"><rect x="7" y="7" width="10" height="10" rx="2"/></svg>'; }
    else { btn.setAttribute('aria-label', '发送'); ic.outerHTML = '<svg id="send-ic" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>'; }
  }

  /* ---------- token 底栏 ---------- */
  function fmtNum(n) { return (n || 0).toLocaleString('en-US'); }
  function updateTokenBar(u) {
    if (!u) return;
    const total = u.total_tokens || ((u.prompt_tokens || 0) + (u.completion_tokens || 0));
    let cached = 0;
    if (u.prompt_tokens_details && u.prompt_tokens_details.cached_tokens) cached = u.prompt_tokens_details.cached_tokens;
    else if (u.cache_read_input_tokens) cached = u.cache_read_input_tokens;
    const bar = $('token-bar');
    bar.style.display = 'block';
    bar.innerHTML = `本轮 <b>${fmtNum(total)}</b> tok` + (cached ? ` · <span class="cache">缓存命中 ${fmtNum(cached)}</span>` : '');
  }

  /* ---------- 记忆（共享档案 + 每角色人设/记忆） ---------- */
  function openMemory() {
    closeDrawer();
    editingCompanionId = sessionCompanion(currentId).id;   // 默认编辑"当前对话的角色"
    renderCompanionTabs();
    loadMemoryForm();
    show('memory-overlay');
  }
  function closeMemory() { hide('memory-overlay'); }

  function renderCompanionTabs() {
    const wrap = $('companion-tabs');
    if (!wrap) return;
    wrap.innerHTML = companions.map(c => `
      <button type="button" class="comp-tab ${c.id === editingCompanionId ? 'sel' : ''}" onclick="selectMemoryCompanion('${c.id}')">
        ${esc(c.name)}
      </button>`).join('') + `<button type="button" class="comp-tab comp-add" onclick="addCompanion()" aria-label="新增角色">+</button>`;
  }
  function selectMemoryCompanion(id) {   // 只切"正在编辑"，不影响正在聊的
    editingCompanionId = id;
    renderCompanionTabs();
    loadMemoryForm();
  }
  function loadMemoryForm() {
    const c = editingCompanion();
    $('about-input').value = sharedAbout();
    $('companion-name-input').value = c.name;
    $('persona-input').value = c.persona || '';
    $('mem-input').value = c.mem || '';
    $('autodistill-toggle').checked = c.autoDistill !== false;
    $('distill-status').textContent = '';
    updateMemCount();
  }
  function updateMemCount() {
    const c = editingCompanion();
    const n = $('mem-input').value.trim().length;
    let t = n ? (n + ' 字') : '空';
    const st = c && distillState[c.id];
    if (st && st.st === 'running') t += ' · 提炼中…';
    else if (st && st.st === 'fail') t += ' · 自动提炼失败';
    else if (c && c.memUpdated) t += ' · 更新于 ' + fmtWhen(c.memUpdated);
    $('mem-count').textContent = t;
  }
  function saveMemory() {
    localStorage.setItem('islet_about', $('about-input').value.trim());   // 共享
    const c = editingCompanion();
    const newName = $('companion-name-input').value.trim();
    if (newName) c.name = newName;
    c.persona = $('persona-input').value.trim();
    const newMem = $('mem-input').value.trim();
    if (newMem !== (c.mem || '')) c.memUpdated = Date.now();
    c.mem = newMem;
    c.autoDistill = $('autodistill-toggle').checked;
    saveCompanions();
    renderDrawerCompanions(); updatePill();
    hide('memory-overlay');
  }
  async function distillNow() {
    if (!messages.length) { $('distill-status').textContent = '当前对话还没有内容'; return; }
    if (!apiKey) { $('distill-status').textContent = '请先在设置里填 API Key'; return; }
    const target = sessionCompanion(currentId);            // 只提炼进"当前对话的角色"
    if (editingCompanionId !== target.id) { editingCompanionId = target.id; renderCompanionTabs(); loadMemoryForm(); }
    const btn = $('distill-btn');
    btn.disabled = true;
    $('distill-status').textContent = '正在提炼…';
    const result = await distillMemory(messages, (target.mem || '').trim());
    btn.disabled = false;
    if (result == null) { $('distill-status').textContent = '提炼失败，请重试'; return; }
    $('mem-input').value = result;
    updateMemCount();
    $('distill-status').textContent = '已更新 ✓ 记得点保存';
  }
  // 把对话提炼成长期记忆（合并去重、压缩）。返回新记忆文本或 null
  const MEM_BUDGET = 800;   // 记忆总长上限（字），可按喜好调整
  async function distillMemory(msgs, existingMem) {
    try {
      const transcript = msgs.filter(m => m.role !== 'system')
        .map(m => (m.role === 'user' ? 'User: ' : 'AI: ') + m.content).join('\n\n');
      if (!transcript.trim()) return null;
      const sys = "You maintain a long-term memory file about a specific relationship for an AI companion app. You will be given the existing memory, then a recent conversation between the user and the AI.\n\nExtract only DURABLE information: facts about the user's life, their preferences, meaningful events between them, how the relationship is developing, emotional notes that will still matter later.\n\nNEVER record any of the following — it would confuse future conversations:\n- Meta or technical talk: questions about which AI model this is, anything about the app itself, prompts, settings, API, or the user testing the AI\n- Small talk and one-off details that won't matter in a week\n- Blow-by-blow accounts of events — keep only the outcome and how it felt\n\nMerge new information into the existing memory: integrate, deduplicate, and actively REWRITE old entries for brevity — compressing or dropping stale content is encouraged. Compress facts into short phrases; feelings and relationship texture may keep slightly more room than plain facts.\n\nHARD LIMIT: the complete memory must stay under " + MEM_BUDGET + " characters. If merging would exceed this, cut the least important content first.\n\nStyle: terse notes, like index cards, not a diary. Example of the register: \"喜欢手冲咖啡，最近工作压力大\" — not full narrative sentences.\n\nDo not invent anything not present in the conversation. Do not restate the user's fixed profile (stored separately). Write in the language the conversation is mostly in. Output ONLY the complete updated memory text — no preamble, no commentary, no code fences.";
      const user = "EXISTING MEMORY:\n" + (existingMem || '(empty)') + "\n\n----\n\nRECENT CONVERSATION:\n" + transcript + "\n\n----\n\nOutput the complete updated memory now.";
      const payload = { model: selectedModel, messages: [{ role: 'system', content: sys }, { role: 'user', content: user }], max_tokens: 4096, stream: false };
      const body = JSON.stringify(payload);
      // keepalive 让页面关闭后请求也能发完；但它限制 body ≤64KB，超了会直接被拒，所以按字节数判断
      const keepalive = new Blob([body]).size < 60000;
      const res = await fetch(API_URL, { method: 'POST', headers: authHeaders(), body, keepalive });
      if (!res.ok) return null;
      const j = await res.json();
      const out = j && j.choices && j.choices[0] && j.choices[0].message && j.choices[0].message.content;
      return (out && out.trim()) ? out.trim() : null;
    } catch (e) { return null; }
  }
  // 自动提炼的运行状态（不持久化）：cid -> {st:'running'|'fail', at}
  let distillState = {};
  function setDistillState(cid, st) {
    if (st) distillState[cid] = { st, at: Date.now() }; else delete distillState[cid];
    if ($('drawer-overlay').classList.contains('show')) renderDrawerCompanions();
    if ($('memory-overlay').classList.contains('show') && editingCompanionId === cid) updateMemCount();
  }
  // 离开对话时自动提炼——写回"这段对话所属的角色"（不是当前激活的）
  async function maybeAutoDistill(sid, snapshot) {
    const c = sessionCompanion(sid);
    if (!c || c.autoDistill === false || !apiKey || !sid) return;
    const userTurns = snapshot.filter(m => m.role === 'user').length;
    const s = sessions.find(x => x.id === sid);
    const lastCount = (s && s.distilled) ? s.distilled : 0;
    if (userTurns < 2 || userTurns <= lastCount) return;
    setDistillState(c.id, 'running');
    const result = await distillMemory(snapshot, (c.mem || '').trim());
    if (result != null) {
      c.mem = result; c.memUpdated = Date.now(); saveCompanions();
      if (s) { s.distilled = userTurns; saveIndex(); }
      setDistillState(c.id, null);
      if ($('memory-overlay').classList.contains('show') && editingCompanionId === c.id) { $('mem-input').value = result; updateMemCount(); }
    } else {
      setDistillState(c.id, 'fail');
    }
  }

  /* ---------- 工具 ---------- */
  function nowTime() { return new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }); }
  function handleKey(e) {
    if (e.isComposing || e.keyCode === 229) return;   // 输入法组字中（选词回车）不发送
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); onSend(); }
  }
  function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 130) + 'px'; }
  function isNearBottom() { const c = $('chat'); return c.scrollHeight - c.scrollTop - c.clientHeight < 120; }
  function maybeScroll() { if (isNearBottom()) scrollToBottom(); }
  function scrollToBottom(force) { const c = $('chat'); if (force || isNearBottom()) c.scrollTop = c.scrollHeight; }
  function show(id) { $(id).classList.add('show'); }
  function hide(id) { $(id).classList.remove('show'); }

  $('drawer-overlay').addEventListener('click', e => { if (e.target.id === 'drawer-overlay') closeDrawer(); });
  $('setup-overlay').addEventListener('click', e => { if (e.target.id === 'setup-overlay') closeSettings(); });
  $('picker-overlay').addEventListener('click', e => { if (e.target.id === 'picker-overlay') closePicker(); });
  $('memory-overlay').addEventListener('click', e => { if (e.target.id === 'memory-overlay') closeMemory(); });
</script>
</body>
</html>
